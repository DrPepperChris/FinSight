# Build, test, and deploy FinSight.Api to Azure App Service

name: Build and deploy FinSight API

on:
  push:
    branches:
      - master
    paths:
      - "FinSight.Api/**"
      - "FinSight.Core/**"
      - "FinSight.Data/**"
      - "FinSight.Tests/**"
      - ".github/workflows/master_finsight-api-cw-2026.yml"

  workflow_dispatch:

env:
  API_PROJECT: ./FinSight.Api/FinSight.Api.csproj
  TEST_PROJECT: ./FinSight.Tests/FinSight.Tests.csproj
  PUBLISH_DIRECTORY: ${{ github.workspace }}/api-publish
  ARTIFACT_NAME: finsight-api

jobs:
  build:
    name: Build and test API
    runs-on: windows-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Restore API
        run: dotnet restore "${{ env.API_PROJECT }}"

      - name: Restore tests
        run: dotnet restore "${{ env.TEST_PROJECT }}"

      - name: Build API
        run: >
          dotnet build "${{ env.API_PROJECT }}"
          --configuration Release
          --no-restore

      - name: Run tests
        run: >
          dotnet test "${{ env.TEST_PROJECT }}"
          --configuration Release
          --no-restore
          --verbosity normal

      - name: Publish API
        run: >
          dotnet publish "${{ env.API_PROJECT }}"
          --configuration Release
          --no-restore
          --output "${{ env.PUBLISH_DIRECTORY }}"

      - name: Upload API artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ${{ env.PUBLISH_DIRECTORY }}
          if-no-files-found: error
          retention-days: 7

  deploy:
    name: Deploy API to Azure
    runs-on: windows-latest
    needs: build

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download API artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME }}
          path: ./api-publish

      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_42DE87F536444E268AE61FE8FB2F507A }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_236B811EF43547E796E030927E27958B }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_96BFFFAC98CA4D0D8B26B47B4B41DF9E }}

      - name: Deploy to Azure App Service
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: finsight-api-cw-2026
          slot-name: Production
          package: ./api-publish
